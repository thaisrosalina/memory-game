<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória</title>

    <!-- Bootstrap ajuda com botões, grid, modal e espaçamentos prontos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons fornece os ícones usados na tela -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Nosso CSS próprio, onde ficam as cores e o visual das cartas -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container py-4">
        <!-- Cabeçalho do jogo -->
        <header class="text-center mb-4">
            <h1 class="display-5 fw-bold text-white">
                <i class="bi bi-grid-3x3-gap-fill"></i> Memory Game
            </h1>
            <p class="text-white-50 mb-0">Encontre os pares e vença o relógio</p>
        </header>

        <!-- Painel de estatísticas -->
        <section class="row g-3 mb-4" aria-label="Estatísticas do jogo">
            <div class="col-6 col-md-3">
                <div class="game-card p-3 text-center h-100">
                    <i class="bi bi-stopwatch fs-3 text-primary"></i>
                    <h6 class="mb-0">Tempo</h6>
                    <span class="stat-value" id="timer">00:00</span>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="game-card p-3 text-center h-100">
                    <i class="bi bi-arrows-move fs-3 text-success"></i>
                    <h6 class="mb-0">Movimentos</h6>
                    <span class="stat-value" id="moves">0</span>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="game-card p-3 text-center h-100">
                    <i class="bi bi-trophy fs-3 text-warning"></i>
                    <h6 class="mb-0">Pontuação</h6>
                    <span class="stat-value" id="score">0</span>
                </div>
            </div>

            <div class="col-6 col-md-3">
                <div class="game-card p-3 text-center h-100">
                    <i class="bi bi-bar-chart fs-3 text-info"></i>
                    <h6 class="mb-0">Nível</h6>
                    <span class="stat-value" id="level">-</span>
                </div>
            </div>
        </section>

        <!-- Painel de controle do jogo -->
        <section class="game-card p-3 mb-4" aria-label="Controles do jogo">
            <div class="row align-items-center g-3">
                <div class="col-md-8">
                    <div class="btn-group w-100 flex-wrap" role="group" aria-label="Escolha de dificuldade">
                        <button id="easyButton" class="btn btn-outline-primary" type="button" onclick="startGame(4)">
                            <i class="bi bi-grid"></i> 4x4 Fácil
                        </button>

                        <button id="hardButton" class="btn btn-outline-primary" type="button" onclick="startGame(6)">
                            <i class="bi bi-grid-3x3"></i> 6x6 Difícil
                        </button>

                        <button class="btn btn-outline-success" type="button" onclick="restartGame()">
                            <i class="bi bi-arrow-repeat"></i> Reiniciar
                        </button>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="form-check form-switch d-flex justify-content-md-end align-items-center gap-2 mb-0">
                        <input class="form-check-input" type="checkbox" role="switch" id="soundToggle">
                        <label class="form-check-label" for="soundToggle">
                            <i class="bi bi-volume-up"></i> Sons
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <!-- Tabuleiro do jogo onde as cartas serão criadas pelo JavaScript -->
        <section class="game-card p-4">
            <div id="gameBoard" class="empty-board text-center py-5">
                <i class="bi bi-joystick fs-1"></i>
                <p class="mt-2 mb-0">Clique em um nível para começar</p>
            </div>
        </section>
    </main>

    <!-- Modal de vitória: aparece quando todos os pares são encontrados -->
    <div class="modal fade" id="victoryModal" tabindex="-1" data-bs-backdrop="static" aria-labelledby="victoryModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="victoryModalTitle">
                        <i class="bi bi-trophy"></i> Parabéns!
                    </h5>
                </div>

                <div class="modal-body text-center">
                    <i class="bi bi-emoji-wink fs-1 text-success"></i>
                    <h3 class="mt-2">Você venceu!</h3>
                    <p id="victoryStats" class="mt-3"></p>

                    <div class="alert alert-info mb-0">
                        Pontuação total: <strong id="finalScore">0</strong>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" type="button" onclick="restartGame()">Jogar novamente</button>
                    <button class="btn btn-secondary" type="button" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Necessário para o modal do Bootstrap funcionar -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Nosso JavaScript próprio, onde fica a lógica do jogo -->
    <script src="script.js"></script>
</body>
</html>
